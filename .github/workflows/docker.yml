name: Docker

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Nibbl backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nibbl-backend:latest
            ghcr.io/${{ github.repository_owner }}/nibbl-backend:${{ github.sha }}
