services:
  nibbl-backend:
    image: ghcr.io/zzm6899/nibbl-backend:latest
    container_name: nibbl-backend
    restart: unless-stopped
    depends_on:
      - postgres
      - minio
    environment:
      TZ: Australia/Sydney
      PORT: 8090
      DATABASE_URL: postgres://nibbl:${POSTGRES_PASSWORD:?set-postgres-password}@postgres:5432/nibbl
      NIBBL_ADMIN_PASSWORD: ${NIBBL_ADMIN_PASSWORD:?set-admin-password}
      OBJECT_STORAGE: s3
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: nibbl
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:?set-minio-user}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?set-minio-password}
      S3_FORCE_PATH_STYLE: "true"
    ports:
      - "5100:8090"
    volumes:
      - /mnt/mainstorage/apps/nibbl/backend-objects:/data/objects
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: nibbl-postgres
    restart: unless-stopped
    environment:
      TZ: Australia/Sydney
      POSTGRES_DB: nibbl
      POSTGRES_USER: nibbl
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set-postgres-password}
    volumes:
      - /mnt/mainstorage/apps/nibbl/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nibbl -d nibbl"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: nibbl-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      TZ: Australia/Sydney
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set-minio-user}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set-minio-password}
    volumes:
      - /mnt/mainstorage/apps/nibbl/objects:/data
    ports:
      - "5101:9001"
