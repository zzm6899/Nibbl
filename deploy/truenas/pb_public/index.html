<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nibbl</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #fff8f1;
        color: #302a28;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 16% 14%, #dcecc7 0 13rem, transparent 13.2rem),
          radial-gradient(circle at 88% 18%, #ffe6b8 0 11rem, transparent 11.2rem),
          radial-gradient(circle at 78% 86%, #d8eff1 0 12rem, transparent 12.2rem),
          linear-gradient(180deg, #fff8f1, #ffe2df);
      }

      main {
        width: min(1040px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 36px 0 28px;
      }

      .hero {
        min-height: 58vh;
        display: grid;
        align-content: center;
        gap: 22px;
      }

      .mark {
        width: 86px;
        height: 86px;
        border-radius: 26px;
        display: grid;
        place-items: center;
        background: #dcecc7;
        box-shadow: inset -10px -10px 0 rgba(255, 255, 255, 0.48), 0 18px 38px rgba(95, 118, 86, 0.18);
        font-size: 44px;
        font-weight: 950;
        color: #2b075f;
      }

      h1 {
        margin: 0;
        font-size: clamp(56px, 13vw, 132px);
        line-height: 0.88;
        letter-spacing: 0;
        color: #2b075f;
      }

      p {
        margin: 0;
        max-width: 690px;
        font-size: clamp(18px, 2.5vw, 24px);
        line-height: 1.55;
        color: #5f7656;
      }

      .invite {
        width: min(620px, 100%);
        padding: 16px 18px;
        border-radius: 18px;
        background: #fff0b8;
        color: #4a3b12;
        font-weight: 850;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-top: 6px;
      }

      .stat {
        min-height: 98px;
        border-radius: 18px;
        background: rgba(255, 253, 248, 0.82);
        padding: 16px;
        box-shadow: 0 14px 38px rgba(122, 87, 65, 0.12);
      }

      .stat strong {
        display: block;
        font-size: 30px;
        color: #2b075f;
      }

      .stat span {
        color: #7a685f;
        font-size: 14px;
        font-weight: 750;
      }

      .footer {
        margin-top: 22px;
        color: #7a685f;
        font-size: 14px;
      }

      @media (max-width: 720px) {
        main {
          padding-top: 24px;
        }

        .hero {
          min-height: 52vh;
        }

        .stats {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <div class="mark" aria-hidden="true">N</div>
        <h1>Nibbl</h1>
        <p>A cute food and drink diary for saving cafe days, drink photos, shared albums, and tiny cravings.</p>
        <p id="invite" class="invite" hidden>Nibbl invite found. Open this link on your phone after installing the app.</p>
      </section>

      <section class="stats" aria-label="Nibbl stats">
        <div class="stat"><strong id="entries">-</strong><span>saved bites</span></div>
        <div class="stat"><strong id="cafes">-</strong><span>cafes</span></div>
        <div class="stat"><strong id="friends">-</strong><span>friends tagged</span></div>
        <div class="stat"><strong id="categories">-</strong><span>food types</span></div>
      </section>

      <div class="footer">Private by default. Simple to self-host.</div>
    </main>
    <script>
      const path = window.location.pathname;
      const params = new URLSearchParams(window.location.search);
      const invite = document.getElementById("invite");
      if (params.has("friend") || params.has("crew")) {
        const name = params.get("name") || "this friend";
        invite.textContent = `Friend tag invite for ${name}. Open this link on your phone to tag shared food and drink logs together.`;
        invite.hidden = false;
      } else if (path.startsWith("/i/") || params.has("i") || params.has("invite")) {
        invite.hidden = false;
      }

      fetch("/api/nibbl/stats")
        .then((response) => response.ok ? response.json() : null)
        .then((stats) => {
          if (!stats) return;
          document.getElementById("entries").textContent = stats.entries ?? 0;
          document.getElementById("cafes").textContent = stats.cafes ?? 0;
          document.getElementById("friends").textContent = stats.friends ?? 0;
          document.getElementById("categories").textContent = stats.categories ?? 0;
        })
        .catch(() => {});
    </script>
  </body>
</html>
